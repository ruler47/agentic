services:
  app:
    build:
      context: .
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://agentic:agentic@postgres:5432/agentic
      LLM_BASE_URL: http://host.docker.internal:1234/v1
      LLM_MODEL: google/gemma-4-26b-a4b
      LLM_TEMPERATURE: "0.2"
      SEARXNG_BASE_URL: http://searxng:8080
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: agentic
      MINIO_SECRET_KEY: agentic-password
      MINIO_BUCKET: agentic-artifacts
      FILE_TOOL_ROOT: /app/workspace
      CHROMIUM_PATH: /usr/bin/chromium
      TZ: Europe/Madrid
      AGENT_TIME_ZONE: Europe/Madrid
      # Phase 13: route built-in tool calls to dockerized services
      # instead of running them in-process.
      BROWSER_OPERATE_RUNNER: docker
      BROWSER_OPERATE_BASE_URL: http://browser-operate:8080
      CHART_GENERATE_RUNNER: docker
      CHART_GENERATE_BASE_URL: http://chart-generate:8080
      MARKET_TIMESERIES_RUNNER: docker
      MARKET_TIMESERIES_BASE_URL: http://market-timeseries:8080
      TELEGRAM_BOT_RUNNER: docker
      TELEGRAM_BOT_BASE_URL: http://telegram-bot:8080
      # Pure-council registry: skip hard-coded built-ins. The only tools
      # visible to the agent are the ones the council has built itself.
      BUILTIN_TOOLS: disabled
      # Phase 17: pass through the optional research-delegation flag.
      # When set to `enabled`, council LLM calls (brainstorm /
      # implement / repair) may emit <request_research> blocks that
      # spawn a fresh UniversalAgent sub-run to fetch current facts.
      # Defaults to unset (feature off).
      COUNCIL_RESEARCH_ENABLED: ${COUNCIL_RESEARCH_ENABLED:-}
    ports:
      - "3000:3000"
    volumes:
      - ./workspace:/app/workspace
      # Tool source-bundles live in <project-root>/tools and are bind-mounted
      # so the council can write new ones on the host. The relative `./tools`
      # path is RESOLVED RELATIVE TO THIS docker-compose.yml — i.e. it ALWAYS
      # points at the canonical project checkout, even if `docker compose` is
      # invoked from a sibling worktree (Claude Code session dir, etc.).
      #
      # Operators on alternate layouts can pin an absolute path via
      # AGENTIC_TOOLS_DIR in `.env` (e.g. AGENTIC_TOOLS_DIR=/srv/agentic-tools)
      # without touching this file.
      - ${AGENTIC_TOOLS_DIR:-./tools}:/app/tools
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      searxng:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
      POSTGRES_DB: agentic
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: agentic
      MINIO_ROOT_PASSWORD: agentic-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: http://127.0.0.1:8080/
    ports:
      - "8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro

  # Phase 13: dockerized browser.operate tool service. The runtime
  # forwards all browser.operate calls here when BROWSER_OPERATE_RUNNER=docker
  # is set on the app service. Self-contained Playwright + Chromium image;
  # restart on failure so a Chromium crash doesn't take the runtime down.
  browser-operate:
    build:
      context: ./tools/browser-operate-service
    environment:
      PORT: "8080"
    shm_size: "1gb"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Phase 13: dockerized chart.generate tool service.
  chart-generate:
    build:
      context: ./tools/chart-generate-service
    environment:
      PORT: "8080"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Phase 13: dockerized market.timeseries tool service.
  market-timeseries:
    build:
      context: ./tools/market-timeseries-service
    environment:
      PORT: "8080"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Phase 13: dockerized telegram.bot tool service skeleton.
  telegram-bot:
    build:
      context: ./tools/telegram-bot-service
    environment:
      PORT: "8080"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
